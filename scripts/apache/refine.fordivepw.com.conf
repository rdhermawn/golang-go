<VirtualHost *:80>
    ServerName refine.fordivepw.com

    RewriteEngine On
    RewriteRule ^/?(.*)$ https://refine.fordivepw.com/$1 [R=301,L]
</VirtualHost>

<IfModule mod_ssl.c>
    <VirtualHost *:443>
        ServerName refine.fordivepw.com

        SSLEngine on
        SSLCertificateFile /etc/letsencrypt/live/refine.fordivepw.com/fullchain.pem
        SSLCertificateKeyFile /etc/letsencrypt/live/refine.fordivepw.com/privkey.pem

        ProxyPreserveHost On
        ProxyRequests Off
        SSLProxyEngine On

        RequestHeader set X-Forwarded-Proto "https"
        RequestHeader set X-Forwarded-Port "443"

        ProxyPass /api/events/stream http://127.0.0.1:8081/api/events/stream retry=0 timeout=600 keepalive=On
        ProxyPassReverse /api/events/stream http://127.0.0.1:8081/api/events/stream

        ProxyPass / http://127.0.0.1:8081/ retry=0 timeout=60 keepalive=On
        ProxyPassReverse / http://127.0.0.1:8081/

        ErrorLog ${APACHE_LOG_DIR}/refine.fordivepw.com-error.log
        CustomLog ${APACHE_LOG_DIR}/refine.fordivepw.com-access.log combined
    </VirtualHost>
</IfModule>
